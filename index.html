<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cohort Economics Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Subscription Cohorts 2026</p>
          <h1>Cohort Economics Planner</h1>
          <p class="save-meta">Горизонт модели: <span id="hero-horizon">24 мес</span></p>
        </div>
        <div class="profile-switcher">
          <label class="profile-label" for="profile-select">Профиль</label>
          <div class="profile-controls">
            <select id="profile-select"></select>
            <button id="add-profile" class="profile-button" type="button">+ Добавить</button>
            <button id="delete-profile" class="profile-button profile-button-danger" type="button">Удалить</button>
          </div>
        </div>
        <nav class="screen-tabs" id="screen-tabs">
          <button class="screen-tab is-active" data-screen="dashboard" type="button">
            Обзор
          </button>
          <button class="screen-tab" data-screen="settings" type="button">
            Настройки
          </button>
        </nav>
        <div class="sync-card">
          <div>
            <span class="sync-label">Shared workspace</span>
            <strong id="save-status">Загрузка…</strong>
            <p id="save-meta" class="save-meta">
              Настройки будут доступны по одной ссылке для всей команды.
            </p>
          </div>
          <button id="save-now" class="save-button" type="button">
            Сохранить сейчас
          </button>
        </div>
      </header>

      <main id="app">
        <section id="dashboard-screen" class="screen-panel"></section>
        <section id="settings-screen" class="screen-panel hidden"></section>
      </main>
    </div>

    <template id="funnel-template">
      <section class="panel funnel-panel">
        <div class="panel-heading">
          <div>
            <p class="panel-kicker"></p>
            <h2></h2>
          </div>
          <p class="panel-note"></p>
        </div>

        <div class="settings-grid">
          <label>
            <span>Название</span>
            <input data-field="name" type="text" />
          </label>
          <label>
            <span>Бюджет января, $</span>
            <input data-field="budgetStart" type="number" min="0" step="1000" />
          </label>
          <label>
            <span>Бюджет декабря, $</span>
            <input data-field="budgetEnd" type="number" min="0" step="1000" />
          </label>
          <label>
            <span>CAC, $</span>
            <input data-field="cac" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span>Средний чек с апсейлами, $</span>
            <input data-field="avgCheck" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span>Чек подписки, $</span>
            <input data-field="subscriptionPrice" type="number" min="0" step="0.01" />
          </label>
        </div>

        <div class="settings-grid">
          <label>
            <span>Конверсия в trial, %</span>
            <input data-field="trialConversion" type="number" min="0" max="100" step="0.1" />
          </label>
          <label>
            <span>Конверсия в первый платеж, %</span>
            <input data-field="month1Conversion" type="number" min="0" max="100" step="0.1" />
          </label>
          <label>
            <span>Stripe со всех транзакций, %</span>
            <input data-field="stripeFee" type="number" min="0" max="100" step="0.1" />
          </label>
          <label>
            <span>Возвраты по первому платежу, %</span>
            <input data-field="refundRate" type="number" min="0" max="100" step="0.1" />
          </label>
          <label>
            <span>Автор по первому платежу, %</span>
            <input data-field="authorRate" type="number" min="0" max="100" step="0.1" />
          </label>
          <label>
            <span>Горизонт расчета, мес.</span>
            <input data-field="horizonMonths" type="number" min="12" max="60" step="1" />
          </label>
        </div>

        <div class="subpanel">
          <div class="subpanel-heading">
            <div>
              <h3>План бюджета и объема</h3>
              <p>
                Бюджет раскладывается линейно от января к декабрю. Объем
                привлечения считается как `бюджет / CAC`, затем применяется
                trial и конверсия в первый платеж.
              </p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="input-table">
              <thead>
                <tr>
                  <th>Месяц</th>
                  <th>Рекламный бюджет, $</th>
                  <th>Привлечения</th>
                  <th>Trial</th>
                  <th>Первые оплаты</th>
                </tr>
              </thead>
              <tbody data-month-plan></tbody>
            </table>
          </div>
        </div>

        <div class="subpanel">
          <div class="subpanel-heading">
            <div>
              <h3>Конверсии удержания</h3>
              <p>
                Для месяцев 2-10 задается отдельная конверсия оплаты. Начиная с
                11-го месяца используется статичная конверсия последнего поля.
              </p>
            </div>
          </div>
          <div class="retention-grid" data-retention-grid></div>
        </div>

        <div class="subpanel">
          <div class="subpanel-heading">
            <div>
              <h3>Результат по воронке</h3>
              <p>Календарная выручка 2026, бюджет, прибыль и LTV по когортам.</p>
            </div>
          </div>
          <div class="metric-grid" data-funnel-metrics></div>
          <div class="table-wrap">
            <table class="result-table">
              <thead>
                <tr>
                  <th>Когорта</th>
                  <th>Бюджет, $</th>
                  <th>Привлечения</th>
                  <th>Первые оплаты</th>
                  <th>Income0, $</th>
                  <th>Income01, $</th>
                  <th>Income012, $</th>
                  <th>Income год, $</th>
                  <th>Lifetime, $</th>
                  <th>Выручка 2026, $</th>
                  <th>Прибыль, $</th>
                </tr>
              </thead>
              <tbody data-cohort-results></tbody>
            </table>
          </div>
        </div>
      </section>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
